
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Teal background -->
  <rect width="512" height="512" rx="102.4" fill="#0d9488"/>

  <!-- White pizza circle base -->
  <circle cx="256" cy="230.4" r="143.36" fill="white" opacity="0.95"/>
  <!-- Sauce layer -->
  <circle cx="256" cy="230.4" r="112.64" fill="#dc2626" opacity="0.85"/>
  <!-- Cheese layer -->
  <ellipse cx="256" cy="230.4" rx="87.04" ry="81.92" fill="#fef3c7"/>

  <!-- Toppings (small dots) -->
  <circle cx="215.04" cy="204.8" r="12.8" fill="#1a1a1a" opacity="0.7"/>
  <circle cx="281.6" cy="220.16" r="11.264" fill="#1a1a1a" opacity="0.7"/>
  <circle cx="235.52" cy="266.24" r="10.24" fill="#16a34a" opacity="0.9"/>
  <circle cx="291.84" cy="256" r="9.216" fill="#16a34a" opacity="0.9"/>

  <!-- Eyes -->
  <circle cx="225.28" cy="220.16" r="20.48" fill="white"/>
  <circle cx="286.72" cy="220.16" r="20.48" fill="white"/>
  <circle cx="227.84" cy="221.696" r="11.264" fill="#1a1a1a"/>
  <circle cx="289.28" cy="221.696" r="11.264" fill="#1a1a1a"/>

  <!-- Smile -->
  <path d="M 220.16 261.12 Q 256 286.72 291.84 261.12"
        stroke="#92400e" stroke-width="9.216" fill="none" stroke-linecap="round"/>

  <!-- "DFJ" text label -->
  <text x="256" y="430.08"
        font-family="Arial, sans-serif" font-weight="900" font-size="66.56"
        fill="white" text-anchor="middle" letter-spacing="1">DFJ</text>
</svg>
